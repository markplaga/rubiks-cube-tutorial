name: Apply solver spec update

on:
  push:
    paths:
      - .github/workflows/apply-solver-spec-update.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update specification
        env:
          UPDATE_B64: 
        run: |
          python - <<'PY'
          import os, base64, zlib
          exec(zlib.decompress(base64.b64decode(os.environ['UPDATE_B64'])).decode(), {})
          PY

      - name: Commit updated specification
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SPEC.md
          git commit -m "Document animated solve engine"
          git push origin main
